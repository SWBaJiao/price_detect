version: '3.8'

services:
  price-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: price-change-monitor
    restart: unless-stopped

    # 环境变量
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - PROXY_URL=http://host.docker.internal:7890
      - TZ=Asia/Shanghai

    # 加载 .env 文件
    env_file:
      - .env

    # 容器内访问宿主机（Linux 兼容）
    extra_hosts:
      - "host.docker.internal:host-gateway"

    # 挂载配置、日志、数据（SQLite 持久化）
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs
      - ./data:/app/data

    # 端口映射（Web仪表板）
    ports:
      - "15000:15000"

    # 网络模式
    network_mode: bridge

    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

    # 日志配置
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
