{% extends "base.html" %}

{% block title %}仪表板 - 合约价格异动监控系统{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <h4><i class="bi bi-speedometer2"></i> 仪表板</h4>
    </div>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <i class="bi bi-info-circle"></i> 系统状态
            </div>
            <div class="card-body">
                <ul class="list-unstyled">
                    <li class="mb-2">
                        <strong>状态:</strong>
                        <span id="system-status-badge" class="badge bg-secondary">连接中...</span>
                    </li>
                    <li class="mb-2">
                        <strong>更新时间:</strong>
                        <span id="update-time">-</span>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    loadSystemStatus();
    setInterval(loadSystemStatus, 10000);
});

function loadSystemStatus() {
    fetch('/api/system/status')
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const d = data.data;
                var badge = document.getElementById('system-status-badge');
                var updateTime = document.getElementById('update-time');
                if (badge) {
                    badge.textContent = '运行中';
                    badge.className = 'badge bg-success';
                }
                if (updateTime && d.timestamp) {
                    updateTime.textContent = new Date(d.timestamp).toLocaleString();
                }
                var statusDot = document.querySelector('.status-dot');
                var statusText = document.querySelector('.status-text');
                if (statusDot) statusDot.className = 'status-dot online';
                if (statusText) statusText.textContent = '系统运行中';
            }
        })
        .catch(err => {
            var statusDot = document.querySelector('.status-dot');
            var statusText = document.querySelector('.status-text');
            if (statusDot) statusDot.className = 'status-dot offline';
            if (statusText) statusText.textContent = '连接失败';
            var badge = document.getElementById('system-status-badge');
            if (badge) {
                badge.textContent = '连接失败';
                badge.className = 'badge bg-danger';
            }
        });
}
</script>
{% endblock %}
